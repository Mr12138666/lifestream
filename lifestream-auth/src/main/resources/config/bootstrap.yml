spring:
  application:
    name: lifestream-auth # 应用名称
  profiles:
    active: prod # 开发环境
  cloud:
    nacos:
      config:
        server-addr: 120.53.242.78:18848,120.53.242.78:19848 # 指定 Nacos 配置中心的服务器地址
        prefix: ${spring.application.name} # 配置 Data Id 前缀，这里使用应用名称作为前缀
        group: DEFAULT_GROUP # 所属组
        namespace: lifestream # 命名空间
        file-extension: yaml # 配置文件格式
        refresh-enabled: true # 是否开启动态刷新