server:
  port: 8000 # 指定启动端口
spring:
  cloud:
    gateway:
      routes: # 用于定义网关的路由规则
        - id: auth #用于唯一标识这个路由。这里将路由的 id 设置为 auth，表示这个路由的配置是针对认证服务的。
          uri: lb://lifestream-auth # 定义了请求将被路由到的目标服务地址。其中 lb 代表的是负载均衡（Load Balancer），lifestream-auth 是认证服务的名称。Spring Cloud Gateway 会使用注册中心（如 Nacos ）来解析并负载均衡到具体的服务实例。
          predicates:
            - Path=/auth/** # 这个 Path 断言用于匹配请求路径。这里 /auth/** 表示所有以 /auth/ 开头的路径都会匹配这个路由规则。例如，/auth/login、/auth/register 都会被这个路由处理。/** 是一个通配符，表示任意的后续路径。
          filters:
            - StripPrefix=1 # 表示去掉路径中的第一个部分。例如，当请求路径为 /auth/verification/code/send 时，去掉第一个前缀部分后，实际传递给 lifestream-auth 服务的路径将变成 /verification/code/send。
  data:
    redis:
      database: 0 # Redis 数据库索引（默认为 0）
      host: 120.53.242.78 # Redis 服务器地址
      port: 16379 # Redis 服务器连接端口
      password: 123123 # Redis 服务器连接密码（默认为空）
      timeout: 6s # 读超时时间
      connect-timeout: 6s # 链接超时时间
      lettuce:
        pool:
          max-active: 200 # 连接池最大连接数
          max-wait: -1ms # 连接池最大阻塞等待时间（使用负值表示没有限制）
          min-idle: 0 # 连接池中的最小空闲连接
          max-idle: 10 # 连接池中的最大空闲连接
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token前缀
  token-prefix: Bearer
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: true
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true